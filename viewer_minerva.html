<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Minerva-Style Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
<style>
:root {
  --bg: #0c1117;
  --panel: #101821;
  --line: #223142;
  --text: #dce6ef;
  --muted: #7e95ab;
}
* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
body {
  display: flex;
  flex-direction: column;
  background: radial-gradient(120% 120% at 10% 10%, #132336 0%, var(--bg) 58%);
  color: var(--text);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--panel) 92%, transparent);
}
.title {
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.group-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.component-legend {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.component-chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 11px;
  padding: 4px 8px;
  line-height: 1;
  background: rgba(11, 18, 27, 0.6);
}
.group-btn {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  border-radius: 999px;
  padding: 6px 11px;
  cursor: pointer;
}
.group-btn.active {
  color: #051018;
  border-color: transparent;
  background: #7ac3ff;
}
.spacer { flex: 1; }
.status {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--muted);
}
.status b { color: var(--text); font-weight: 600; }
.zoom-controls {
  display: flex;
  gap: 5px;
}
.zoom-btn {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
}
#viewer-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 0;
}
#osd {
  width: 100%;
  height: 100%;
  background: #080d12;
}
#overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
#hint {
  position: absolute;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(8, 13, 18, 0.7);
  color: var(--muted);
  font-size: 11px;
}
@media (max-width: 860px) {
  header { flex-wrap: wrap; }
  .spacer { display: none; }
}
</style>
</head>
<body>
<header>
  <div class="title">CRC Simple Viewer</div>
  <div class="group-buttons" id="group-buttons"></div>
  <div class="component-legend" id="component-legend"></div>
  <div class="spacer"></div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoom-out" type="button">-</button>
    <button class="zoom-btn" id="zoom-in" type="button">+</button>
  </div>
  <div class="status">
    <span>GROUP <b id="group-label">H&E</b></span>
    <span>ZOOM <b id="zoom-val">-</b></span>
    <span>IN VIEW <b id="in-view">-</b></span>
  </div>
</header>
<div id="viewer-wrap">
  <div id="osd"></div>
  <canvas id="overlay"></canvas>
  <div id="hint">Mouse wheel: zoom · drag: pan</div>
</div>

<script>
const GROUP_HE = {
  id: "he",
  label: "H&E",
  color: [0, 0, 0, 0],
};

let meta = null;
let viewer = null;
let currentGroup = GROUP_HE.id;
let fetchCtrl = null;
let drawCells = [];
const cellCache = new Map();
let lastPrefetchKey = "";
const CACHE_MAX_ITEMS = 160;

const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");

function makeTileSource(width, height) {
  const maxDim = Math.max(width, height);
  const maxLevel = Math.ceil(Math.log2(maxDim));
  return {
    width,
    height,
    tileSize: 254,
    tileOverlap: 1,
    minLevel: 0,
    maxLevel,
    getTileUrl: (level, x, y) => `/dzi/he_files/${level}/${x}_${y}.jpg`,
  };
}

function resizeOverlay() {
  overlay.width = overlay.clientWidth;
  overlay.height = overlay.clientHeight;
  redraw();
}

function quantize(value, step) {
  return Math.floor(value / step);
}

function cachePayload(key, payload) {
  if (!cellCache.has(key) && cellCache.size >= CACHE_MAX_ITEMS) {
    const oldestKey = cellCache.keys().next().value;
    cellCache.delete(oldestKey);
  }
  cellCache.set(key, payload);
}

function getCurrentViewBounds() {
  const boundsVp = viewer.viewport.getBounds(true);
  const topLeft = viewer.viewport.viewportToImageCoordinates(boundsVp.x, boundsVp.y);
  const bottomRight = viewer.viewport.viewportToImageCoordinates(
    boundsVp.x + boundsVp.width,
    boundsVp.y + boundsVp.height
  );
  const x0 = Math.max(0, Math.min(meta.img_w, topLeft.x));
  const y0 = Math.max(0, Math.min(meta.img_h, topLeft.y));
  const x1 = Math.max(0, Math.min(meta.img_w, bottomRight.x));
  const y1 = Math.max(0, Math.min(meta.img_h, bottomRight.y));
  return {
    left: Math.min(x0, x1),
    right: Math.max(x0, x1),
    top: Math.min(y0, y1),
    bottom: Math.max(y0, y1),
  };
}

function maxCellsForZoom() {
  const zoom = viewer.viewport.getZoom(true);
  if (zoom >= 6) return 10000;
  if (zoom >= 3) return 6000;
  return 2800;
}

function setCurrentGroup(groupId) {
  currentGroup = groupId;
  const all = [GROUP_HE, ...meta.groups];
  const selected = all.find((group) => group.id === currentGroup) || GROUP_HE;

  document.getElementById("group-label").textContent = selected.label;
  document.querySelectorAll(".group-btn").forEach((button) => {
    button.classList.toggle("active", button.dataset.group === groupId);
    const group = all.find((item) => item.id === button.dataset.group) || GROUP_HE;
    if (button.classList.contains("active") && group.id !== GROUP_HE.id) {
      const rgba = `rgba(${group.color[0]}, ${group.color[1]}, ${group.color[2]}, ${group.color[3] / 255})`;
      button.style.background = rgba;
      button.style.color = "#061118";
    } else if (button.classList.contains("active")) {
      button.style.background = "#7ac3ff";
      button.style.color = "#061118";
    } else {
      button.style.background = "transparent";
      button.style.color = "var(--muted)";
    }
  });
  updateComponentLegend();
  requestCells();
}

function updateComponentLegend() {
  const legend = document.getElementById("component-legend");
  legend.innerHTML = "";
  if (!meta || currentGroup === GROUP_HE.id) return;

  const selected = meta.groups.find((group) => group.id === currentGroup);
  if (!selected || !Array.isArray(selected.components)) return;

  let shown = 0;
  for (const comp of selected.components) {
    if (!comp.available) continue;
    const chip = document.createElement("span");
    chip.className = "component-chip";
    chip.textContent = comp.label;
    const color = comp.color || [180, 180, 180, 220];
    chip.style.borderColor = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.9)`;
    chip.style.color = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 1)`;
    legend.appendChild(chip);
    shown += 1;
  }

  if (shown === 0) {
    const chip = document.createElement("span");
    chip.className = "component-chip";
    chip.textContent = "No marker channels";
    legend.appendChild(chip);
  }
}

function redraw() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!viewer || currentGroup === GROUP_HE.id) return;

  const zoom = viewer.viewport.getZoom(true);
  const radius = Math.max(1.2, Math.min(4.8, zoom / 2.8));
  for (const cell of drawCells) {
    const viewportPoint = viewer.viewport.imageToViewportCoordinates(cell.x, cell.y);
    const screen = viewer.viewport.pixelFromPoint(viewportPoint, true);
    if (screen.x < -10 || screen.y < -10 || screen.x > overlay.width + 10 || screen.y > overlay.height + 10) continue;
    ctx.beginPath();
    ctx.arc(screen.x, screen.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cell.r},${cell.g},${cell.b},${cell.a / 255})`;
    ctx.fill();
  }
}

function updateStatus() {
  if (!viewer) return;
  document.getElementById("zoom-val").textContent = viewer.viewport.getZoom(true).toFixed(2);
}

function requestCells() {
  if (!viewer || !meta) return;
  updateStatus();
  if (currentGroup === GROUP_HE.id) {
    drawCells = [];
    document.getElementById("in-view").textContent = "0";
    redraw();
    return;
  }

  const bounds = getCurrentViewBounds();
  const maxCells = maxCellsForZoom();
  const cacheKey = [
    currentGroup,
    quantize(bounds.left, 256),
    quantize(bounds.top, 256),
    quantize(bounds.right, 256),
    quantize(bounds.bottom, 256),
    maxCells,
  ].join(":");

  if (cellCache.has(cacheKey)) {
    const payload = cellCache.get(cacheKey);
    drawCells = payload.cells || [];
    const suffix = payload.sampled ? "+" : "";
    document.getElementById("in-view").textContent = `${payload.total_in_view}${suffix}`;
    redraw();
    return;
  }

  document.getElementById("in-view").textContent = "…";

  if (fetchCtrl) fetchCtrl.abort();
  fetchCtrl = new AbortController();
  const query = new URLSearchParams({
    group: currentGroup,
    x0: String(bounds.left),
    y0: String(bounds.top),
    x1: String(bounds.right),
    y1: String(bounds.bottom),
    max_cells: String(maxCells),
  });

  fetch(`/cells?${query.toString()}`, { signal: fetchCtrl.signal })
    .then((response) => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    })
    .then((payload) => {
      cachePayload(cacheKey, payload);
      drawCells = payload.cells || [];
      const suffix = payload.sampled ? "+" : "";
      document.getElementById("in-view").textContent = `${payload.total_in_view}${suffix}`;
      redraw();
      prefetchOtherGroups(bounds);
    })
    .catch((error) => {
      if (error.name !== "AbortError") {
        console.error("cells fetch failed", error);
      }
    });
}

function prefetchOtherGroups(bounds) {
  const viewKey = [
    quantize(bounds.left, 256),
    quantize(bounds.top, 256),
    quantize(bounds.right, 256),
    quantize(bounds.bottom, 256),
  ].join(":");
  if (viewKey === lastPrefetchKey) return;
  lastPrefetchKey = viewKey;

  const groups = meta.groups.map((group) => group.id).filter((group) => group !== currentGroup);
  for (const group of groups) {
    const maxCells = 3500;
    const key = [group, quantize(bounds.left, 256), quantize(bounds.top, 256), quantize(bounds.right, 256), quantize(bounds.bottom, 256), maxCells].join(":");
    if (cellCache.has(key)) continue;
    const query = new URLSearchParams({
      group,
      x0: String(bounds.left),
      y0: String(bounds.top),
      x1: String(bounds.right),
      y1: String(bounds.bottom),
      max_cells: String(maxCells),
    });
    fetch(`/cells?${query.toString()}`)
      .then((response) => (response.ok ? response.json() : null))
      .then((payload) => {
        if (payload) cachePayload(key, payload);
      })
      .catch(() => {});
  }
}

function initButtons() {
  const buttons = document.getElementById("group-buttons");
  const groups = [GROUP_HE, ...meta.groups];
  groups.forEach((group) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "group-btn";
    button.dataset.group = group.id;
    button.textContent = group.label;
    button.addEventListener("click", () => setCurrentGroup(group.id));
    buttons.appendChild(button);
  });
  setCurrentGroup(GROUP_HE.id);
}

async function init() {
  meta = await fetch("/meta").then((response) => response.json());
  initButtons();

  viewer = OpenSeadragon({
    id: "osd",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
    tileSources: makeTileSource(meta.img_w, meta.img_h),
    showNavigator: true,
    navigatorPosition: "TOP_LEFT",
    navigatorWidth: "120px",
    navigatorHeight: "80px",
    showHomeControl: true,
    showZoomControl: true,
    showFullPageControl: false,
    maxZoomPixelRatio: 24,
    minZoomImageRatio: 0.8,
    animationTime: 0.45,
    blendTime: 0.05,
    visibilityRatio: 0.45,
  });

  const schedule = (() => {
    let timer = null;
    return () => {
      if (timer) window.clearTimeout(timer);
      timer = window.setTimeout(requestCells, 120);
    };
  })();

  viewer.addHandler("open", () => {
    resizeOverlay();
    requestCells();
    prefetchOtherGroups(getCurrentViewBounds());
  });
  viewer.addHandler("animation", schedule);
  viewer.addHandler("animation-finish", schedule);
  viewer.addHandler("zoom", schedule);
  viewer.addHandler("pan", schedule);

  document.getElementById("zoom-in").addEventListener("click", () => {
    viewer.viewport.zoomBy(1.25);
    viewer.viewport.applyConstraints();
  });
  document.getElementById("zoom-out").addEventListener("click", () => {
    viewer.viewport.zoomBy(0.8);
    viewer.viewport.applyConstraints();
  });

  window.addEventListener("resize", resizeOverlay);
}

init().catch((error) => {
  console.error(error);
  alert("Failed to initialize viewer. Check server logs.");
});
</script>
</body>
</html>
