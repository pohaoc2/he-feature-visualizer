<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRC02 — TME Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
<style>
:root {
  --bg:     #080b0e;
  --panel:  #0e1318;
  --border: #1a2230;
  --text:   #dce8f0;
  --muted:  #3d5060;
  --mono:   'Space Mono', monospace;
  --sans:   'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
header {
  display: flex; align-items: center; gap: 18px;
  padding: 0 20px; height: 52px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.logo {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; white-space: nowrap; line-height: 1.5;
}
.logo em { color: var(--muted); font-style: normal; font-weight: 400; }
.sep { width: 1px; height: 28px; background: var(--border); }
.modes { display: flex; gap: 4px; }
.mode-btn {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase;
  padding: 6px 13px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); border-radius: 3px;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: color .12s, border-color .12s, background .12s; white-space: nowrap;
}
.mode-btn:hover { color: var(--text); border-color: #2a3a4a; }
.mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.mode-btn[data-mode="cells"]       .dot { background: #ff6496; }
.mode-btn[data-mode="vasculature"] .dot { background: #ff4444; }
.mode-btn[data-mode="immune"]      .dot { background: #44aaff; }
.mode-btn.active .dot { opacity: 0.6; }
.status {
  margin-left: auto; display: flex; align-items: center; gap: 18px;
  font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0;
}
.status span { color: var(--text); }
#loading { display:none; color: #4a8fff; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#viewer-wrap { flex: 1; position: relative; overflow: hidden; }
#osd { width: 100%; height: 100%; background: #050709; }
#thumb-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: contain; background-repeat: no-repeat;
  background-position: center; z-index: 0; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
#dot-canvas {
  position: absolute; top: 0; left: 0;
  pointer-events: none; z-index: 5; display: none;
}
#legend {
  position: absolute; bottom: 20px; right: 16px; z-index: 20;
  background: rgba(8,11,14,0.92); border: 1px solid var(--border);
  border-radius: 4px; padding: 13px 16px; backdrop-filter: blur(10px); min-width: 170px;
}
.leg-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: .13em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
}
.leg-row {
  display: flex; align-items: center; gap: 9px; margin-bottom: 7px;
  font-size: 12px; font-weight: 300; color: var(--text);
}
.leg-row:last-child { margin-bottom: 0; }
.leg-swatch { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
#hint {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 20; font-family: var(--mono); font-size: 10px; letter-spacing: .09em;
  color: var(--muted); background: rgba(8,11,14,0.85); padding: 5px 14px;
  border-radius: 3px; border: 1px solid var(--border); pointer-events: none;
  transition: opacity .35s;
}
#err {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 100; background: #1a0a0a; border: 1px solid #552222;
  color: #ff8888; font-family: var(--mono); font-size: 11px;
  padding: 16px 24px; border-radius: 4px; display: none; max-width: 480px;
  text-align: center; line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <div class="logo">CRC<em>02</em><br><em>TME VIEWER</em></div>
  <div class="sep"></div>
  <div class="modes">
    <button class="mode-btn active" data-mode="cells"><span class="dot"></span>All Cells</button>
    <button class="mode-btn" data-mode="vasculature"><span class="dot"></span>Vasculature</button>
    <button class="mode-btn" data-mode="immune"><span class="dot"></span>Immune</button>
  </div>
  <div class="status">
    <span id="loading">LOADING…</span>
    <span>ZOOM <span id="zoom-val">—</span></span>
    <span>IN VIEW <span id="cell-count">—</span></span>
    <span>RENDER <span id="render-val">heatmap</span></span>
  </div>
</header>

<div id="viewer-wrap">
  <div id="thumb-bg"></div>
  <div id="osd"></div>
  <canvas id="dot-canvas"></canvas>
  <div id="hint">Zoom in further to see individual cells</div>
  <div id="legend"></div>
  <div id="err"></div>
</div>

<script>
// ================================================================
// DOT_ZOOM: OSD zoom level (pixels per screen pixel) at which we
// switch from heatmap to individual dots.
const DOT_ZOOM = 8;

const LEGENDS = {
  cells: [
    { label: "Tumor",   color: "rgba(255,100,150,.85)" },
    { label: "Immune",  color: "rgba(80,220,80,.85)"   },
    { label: "Stromal", color: "rgba(255,160,50,.85)"  },
    { label: "Other",   color: "rgba(180,180,180,.5)"  },
  ],
  vasculature: [
    { label: "CD31⁺ Vessel", color: "rgba(220,50,50,.9)" },
  ],
  immune: [
    { label: "CD8a⁺ Cytotoxic T", color: "rgba(60,120,255,.9)"  },
    { label: "CD68⁺ Macrophage",  color: "rgba(60,200,80,.9)"   },
    { label: "FOXP3⁺ Treg",       color: "rgba(160,60,220,.9)"  },
    { label: "CD4⁺ Helper T",     color: "rgba(240,210,40,.9)"  },
    { label: "CD20⁺ B cell",      color: "rgba(40,210,210,.9)"  },
    { label: "Other CD45⁺",       color: "rgba(220,220,220,.5)" },
  ],
};

let viewer = null, meta = null;
let heatmapTiledImage = null;
let currentMode = "cells";
let dots = [], fetchTimer = null, fetchCtrl = null;

const canvas = document.getElementById("dot-canvas");
const ctx    = canvas.getContext("2d");

function showError(msg) {
  const el = document.getElementById("err");
  el.textContent = msg;
  el.style.display = "block";
}

// ================================================================
// Build OSD tile source object from metadata (no XML manifest needed)
// ================================================================
function makeTileSource(urlPath, imgW, imgH, format, minLevel) {
  const maxDim   = Math.max(imgW, imgH);
  const maxLevel = Math.ceil(Math.log2(maxDim));
  return {
    width:       imgW,
    height:      imgH,
    tileSize:    254,
    tileOverlap: 1,
    minLevel:    minLevel !== undefined ? minLevel : 0,
    maxLevel:    maxLevel,
    getTileUrl: function(level, x, y) {
      return `${urlPath}/${level}/${x}_${y}.${format}`;
    }
  };
}

// ================================================================
// Init
// ================================================================
async function init() {
  try {
    meta = await fetch("/meta").then(r => {
      if (!r.ok) throw new Error(`/meta returned ${r.status}`);
      return r.json();
    });
  } catch(e) {
    showError("Could not load metadata: " + e.message);
    return;
  }

  const imgW = meta.img_w;
  const imgH = meta.img_h;

  viewer = OpenSeadragon({
    id:                    "osd",
    prefixUrl:             "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
    tileSources:           makeTileSource("/dzi/he_files", imgW, imgH, "jpg", 8),
    showNavigator:         true,
    navigatorPosition:     "TOP_LEFT",
    navigatorHeight:       "80px",
    navigatorWidth:        "120px",
    animationTime:         0.4,
    blendTime:             0.1,
    minZoomImageRatio:     0.8,
    maxZoomPixelRatio:     20,
    showZoomControl:       true,
    showHomeControl:       true,
    showFullPageControl:   false,
    visibilityRatio:       0.5,
    constrainDuringPan:    false,
  });

  viewer.addHandler("open", () => {
    console.log("OSD open fired");
    loadHeatmap();
    resizeCanvas();
    updateLegend();
    onViewChange();
    window.addEventListener("resize", () => { resizeCanvas(); redrawDots(); });
  });

  viewer.addHandler("open-failed", (e) => {
    showError("OSD failed to open tile source: " + JSON.stringify(e));
  });

  viewer.addHandler("animation",  onViewChange);
  viewer.addHandler("animation-finish", onViewChange);
  viewer.addHandler("zoom",       onViewChange);
  viewer.addHandler("pan",        onViewChange);

  document.querySelectorAll(".mode-btn").forEach(b =>
    b.addEventListener("click", () => setMode(b.dataset.mode)));

  // Load thumbnail as background fallback for low zoom levels
  const thumb = document.getElementById("thumb-bg");
  thumb.style.backgroundImage = "url('/thumbnail.jpg')";
}

// ================================================================
// Heatmap overlay
// ================================================================
function loadHeatmap() {
  if (heatmapTiledImage) {
    viewer.world.removeItem(heatmapTiledImage);
    heatmapTiledImage = null;
  }
  viewer.addTiledImage({
    tileSource: makeTileSource(`/dzi/heatmap_${currentMode}_files`, meta.img_w, meta.img_h, "png", meta.dzi_max_level - 4),
    opacity:    isHeatmapZoom() ? 0.7 : 0,
    index:      1,
    success:    (e) => { heatmapTiledImage = e.item; },
    error:      (e) => { console.warn("Heatmap load error", e); },
  });
}

// ================================================================
// Mode switching
// ================================================================
function setMode(newMode) {
  currentMode = newMode;
  document.querySelectorAll(".mode-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.mode === newMode));
  dots = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById("cell-count").textContent = "—";
  loadHeatmap();
  updateLegend();
  onViewChange();
}

// ================================================================
// View helpers
// ================================================================
function currentZoom() {
  return viewer && viewer.viewport ? viewer.viewport.getZoom(true) : 0;
}
function isHeatmapZoom() { return currentZoom() < DOT_ZOOM; }

function onViewChange() {
  if (!viewer || !viewer.viewport) return;
  const z       = currentZoom();
  const heatmap = isHeatmapZoom();

  document.getElementById("zoom-val").textContent  = z.toFixed(1);
  document.getElementById("render-val").textContent = heatmap ? "heatmap" : "dots";
  document.getElementById("hint").style.opacity     = z < 2 ? "1" : "0";

  if (heatmapTiledImage) heatmapTiledImage.setOpacity(heatmap ? 0.7 : 0);
  // Show thumbnail background when zoomed out past minLevel=8
  const thumb = document.getElementById("thumb-bg");
  if (thumb) thumb.style.opacity = (z < 2) ? "1" : "0";
  canvas.style.display = heatmap ? "none" : "block";

  if (!heatmap) {
    clearTimeout(fetchTimer);
    fetchTimer = setTimeout(fetchDots, 200);
  } else {
    dots = [];
    document.getElementById("cell-count").textContent = "—";
  }
}

// ================================================================
// Fetch + draw dots
// ================================================================
async function fetchDots() {
  if (!viewer || !viewer.viewport) return;
  if (fetchCtrl) fetchCtrl.abort();
  fetchCtrl = new AbortController();

  const vp     = viewer.viewport;
  const bounds = vp.getBounds(true);
  const imgW   = meta.img_w;
  const imgH   = meta.img_h;

  const x0 = bounds.x * imgW;
  const y0 = bounds.y * imgH;
  const x1 = (bounds.x + bounds.width)  * imgW;
  const y1 = (bounds.y + bounds.height) * imgH;

  document.getElementById("loading").style.display = "inline";
  try {
    const params = new URLSearchParams({ mode: currentMode, x0, y0, x1, y1, max_cells: 10000 });
    const data   = await fetch("/cells?" + params, { signal: fetchCtrl.signal }).then(r => r.json());
    dots = data.cells;
    document.getElementById("cell-count").textContent = data.total_in_view.toLocaleString();
    redrawDots();
  } catch(e) {
    if (e.name !== "AbortError") console.error("fetchDots error:", e);
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

function resizeCanvas() {
  const wrap    = document.getElementById("viewer-wrap");
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function redrawDots() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!viewer || !viewer.viewport || !dots.length) return;

  const vp   = viewer.viewport;
  const imgW = meta.img_w;
  const imgH = meta.img_h;
  const z    = currentZoom();
  const r    = Math.max(1.5, Math.min(6, z * 0.4));

  dots.forEach(d => {
    // image pixel coords → OSD viewport coords (0..1 range based on width)
    const vpPt = new OpenSeadragon.Point(d.x / imgW, d.y / imgH);
    const px   = vp.viewportToViewerElementCoordinates(vpPt);
    ctx.beginPath();
    ctx.arc(px.x, px.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${d.r},${d.g},${d.b},${(d.a / 255).toFixed(2)})`;
    ctx.fill();
  });
}

// ================================================================
// Legend
// ================================================================
function updateLegend() {
  const titles = { cells: "CELL TYPES", vasculature: "MARKER", immune: "IMMUNE SUBTYPES" };
  document.getElementById("legend").innerHTML =
    `<div class="leg-title">${titles[currentMode]}</div>` +
    LEGENDS[currentMode].map(i =>
      `<div class="leg-row">
         <div class="leg-swatch" style="background:${i.color}"></div>${i.label}
       </div>`).join("");
}

init().catch(e => showError("Init error: " + e.message));
</script>
</body>
</html>
