<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch viewer — H&E + features</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080b0e;
  --panel:  #0e1318;
  --border: #1a2230;
  --text:   #dce8f0;
  --muted:  #3d5060;
  --mono:   'Space Mono', monospace;
  --sans:   'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); height: 100vh;
  display: flex; overflow: hidden;
}
aside {
  width: 220px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
aside h2 {
  font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
  color: var(--muted); padding: 14px 12px; border-bottom: 1px solid var(--border);
}
#patch-list {
  flex: 1; overflow-y: auto; padding: 8px;
}
.patch-btn {
  display: block; width: 100%; text-align: left;
  font-family: var(--mono); font-size: 11px; padding: 8px 10px;
  background: transparent; color: var(--muted); border: none; border-radius: 4px;
  cursor: pointer; margin-bottom: 2px;
}
.patch-btn:hover { background: #1a2230; color: var(--text); }
.patch-btn.active { background: var(--text); color: var(--bg); }
main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.controls {
  display: flex; align-items: center; gap: 16px; padding: 10px 16px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.controls label { font-family: var(--mono); font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 8px; cursor: pointer; }
.controls input[type="checkbox"] { cursor: pointer; }
.nav-btn {
  font-family: var(--mono); font-size: 10px; padding: 6px 10px;
  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  border-radius: 3px; cursor: pointer;
}
.nav-btn:hover { background: #1a2230; }
.nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#view-area {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
  padding: 20px; overflow: auto; min-height: 0;
}
#view-area .stack {
  position: relative; width: 256px; height: 256px; flex-shrink: 0;
}
#view-area .stack img {
  position: absolute; top: 0; left: 0; width: 256px; height: 256px;
  pointer-events: none;
}
#view-area .stack img.overlay { mix-blend-mode: normal; }
#status {
  padding: 8px 16px; font-family: var(--mono); font-size: 10px; color: var(--muted);
  border-top: 1px solid var(--border);
}
#status .patch-id { color: var(--text); }
</style>
</head>
<body>
<aside>
  <h2>Patches</h2>
  <div id="patch-list"></div>
</aside>
<main>
  <div class="controls">
    <label><input type="checkbox" id="mux_rgb"> Multiplex (RGB)</label>
    <label><input type="checkbox" id="overlay" checked> Overlay (cells)</label>
    <label><input type="checkbox" id="cell_mask"> Cell mask</label>
    <label><input type="checkbox" id="cellvit_mask"> CellViT mask</label>
    <label><input type="checkbox" id="cell_state"> Cell state</label>
    <label><input type="checkbox" id="vasculature"> Vasculature</label>
    <label><input type="checkbox" id="immune"> Immune</label>
    <label><input type="checkbox" id="oxygen"> Oxygen</label>
    <label><input type="checkbox" id="glucose"> Glucose</label>
    <span style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
      <button type="button" id="btn-prev" class="nav-btn">Prev</button>
      <input type="number" id="patch-index" min="0" value="0" style="width: 60px; padding: 4px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 3px; font-family: var(--mono);">
      <span id="patch-count">/ 0</span>
      <button type="button" id="btn-next" class="nav-btn">Next</button>
    </span>
  </div>
  <div id="view-area">
    <div class="stack" id="stack" style="display:none;">
      <img id="img-he" alt="H&E" />
      <img id="img-mux_rgb" class="overlay" alt="Multiplex RGB" />
      <img id="img-overlay" class="overlay" alt="Overlay" />
      <img id="img-cell_mask" class="overlay" alt="Cell mask" />
      <img id="img-cellvit_mask" class="overlay" alt="CellViT mask" />
      <img id="img-cell_state" class="overlay" alt="Cell state" />
      <img id="img-vasculature" class="overlay" alt="Vasculature" />
      <img id="img-immune" class="overlay" alt="Immune" />
      <img id="img-oxygen" class="overlay" alt="Oxygen" />
      <img id="img-glucose" class="overlay" alt="Glucose" />
    </div>
    <p id="no-patch" style="color: var(--muted);">Load index, then select a patch.</p>
  </div>
  <div id="status">No patch selected.</div>
</main>
<script>
(function () {
  const base = ''; // same origin
  let index = { patches: [], features: [] };
  const patchListEl = document.getElementById('patch-list');
  const stackEl = document.getElementById('stack');
  const noPatchEl = document.getElementById('no-patch');
  const statusEl = document.getElementById('status');
  const imgHe = document.getElementById('img-he');
  const imgMux = document.getElementById('img-mux_rgb');
  const imgOverlay = document.getElementById('img-overlay');
  const layerImgs = {
    mux_rgb: document.getElementById('img-mux_rgb'),
    cell_mask: document.getElementById('img-cell_mask'),
    cellvit_mask: document.getElementById('img-cellvit_mask'),
    cell_state: document.getElementById('img-cell_state'),
    vasculature: document.getElementById('img-vasculature'),
    immune: document.getElementById('img-immune'),
    oxygen: document.getElementById('img-oxygen'),
    glucose: document.getElementById('img-glucose'),
  };
  const layerChecks = {
    mux_rgb: document.getElementById('mux_rgb'),
    overlay: document.getElementById('overlay'),
    cell_mask: document.getElementById('cell_mask'),
    cellvit_mask: document.getElementById('cellvit_mask'),
    cell_state: document.getElementById('cell_state'),
    vasculature: document.getElementById('vasculature'),
    immune: document.getElementById('immune'),
    oxygen: document.getElementById('oxygen'),
    glucose: document.getElementById('glucose'),
  };

  function patchId(p) { return p.i + '_' + p.j; }

  function setPatchVisibility() {
    if (layerChecks.mux_rgb && layerChecks.mux_rgb.checked) {
      imgMux.style.display = 'block';
    } else {
      imgMux.style.display = 'none';
    }
    imgOverlay.style.display = layerChecks.overlay.checked ? 'block' : 'none';
    Object.keys(layerImgs).forEach(function (k) {
      layerImgs[k].style.display = layerChecks[k] && layerChecks[k].checked ? 'block' : 'none';
    });
  }

  if (layerChecks.mux_rgb) layerChecks.mux_rgb.addEventListener('change', setPatchVisibility);
  layerChecks.overlay.addEventListener('change', setPatchVisibility);
  Object.keys(layerChecks).filter(function (k) { return k !== 'overlay'; }).forEach(function (k) {
    if (layerChecks[k]) layerChecks[k].addEventListener('change', setPatchVisibility);
  });

  let currentIndex = 0;

  function loadPatchByIndex(idx) {
    if (!index.patches.length) return;
    currentIndex = Math.max(0, Math.min(idx, index.patches.length - 1));
    const p = index.patches[currentIndex];
    loadPatch(p);
    document.getElementById('patch-index').value = currentIndex;
    document.getElementById('btn-prev').disabled = currentIndex === 0;
    document.getElementById('btn-next').disabled = currentIndex === index.patches.length - 1;
    const btn = patchListEl.querySelector('[data-id="' + patchId(p) + '"]');
    if (btn) btn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function loadPatch(p) {
    const id = patchId(p);
    stackEl.style.display = 'block';
    noPatchEl.style.display = 'none';
    statusEl.innerHTML = 'Patch <span class="patch-id">' + id + '</span> (x0=' + p.x0 + ', y0=' + p.y0 + ')';

    imgHe.src = base + '/patches/he/' + id + '.png';
    imgMux.src = base + '/patches/mux_rgb/' + id + '.png';
    imgMux.onerror = function () { imgMux.style.display = 'none'; };
    imgMux.onload = function () { imgMux.style.display = layerChecks.mux_rgb && layerChecks.mux_rgb.checked ? 'block' : 'none'; };
    imgOverlay.src = base + '/patches/overlay_cells/' + id + '.png';
    imgOverlay.onerror = function () { imgOverlay.style.display = 'none'; };
    imgOverlay.onload = function () { imgOverlay.style.display = layerChecks.overlay.checked ? 'block' : 'none'; };

    ['mux_rgb', 'cell_mask', 'cellvit_mask', 'cell_state', 'vasculature', 'immune', 'oxygen', 'glucose'].forEach(function (layer) {
      if (layer === 'mux_rgb') return;
      const img = layerImgs[layer];
      const check = layerChecks[layer];
      img.src = base + '/patches/' + layer + '/' + id + '.png';
      img.onerror = function () { img.style.display = 'none'; };
      img.onload = function () { img.style.display = check && check.checked ? 'block' : 'none'; };
    });

    document.querySelectorAll('.patch-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.id === id);
    });
  }

  fetch(base + '/index.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      index = data;
      index.patches.forEach(function (p) {
        const id = patchId(p);
        const btn = document.createElement('button');
        btn.className = 'patch-btn';
        btn.dataset.id = id;
        btn.textContent = id;
        btn.addEventListener('click', function () {
          const idx = index.patches.findIndex(function (q) { return patchId(q) === patchId(p); });
          if (idx >= 0) loadPatchByIndex(idx);
        });
        patchListEl.appendChild(btn);
      });
      document.getElementById('patch-count').textContent = '/ ' + index.patches.length;
      document.getElementById('patch-index').max = Math.max(0, index.patches.length - 1);
      document.getElementById('btn-prev').addEventListener('click', function () { loadPatchByIndex(currentIndex - 1); });
      document.getElementById('btn-next').addEventListener('click', function () { loadPatchByIndex(currentIndex + 1); });
      document.getElementById('patch-index').addEventListener('change', function () {
        loadPatchByIndex(parseInt(this.value, 10) || 0);
      });
      if (index.patches.length) {
        loadPatchByIndex(0);
      }
    })
    .catch(function (e) {
      patchListEl.innerHTML = '<p style="color:#a44; padding:10px;">Failed to load index: ' + e.message + '</p>';
    });
})();
</script>
</body>
</html>
