<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patch Viewer</title>
</head>
<body>
  <div id="controls">
    <input id="mux_rgb" type="checkbox" />
    <input id="cellvit_mask" type="checkbox" />
    <input id="cell_state" type="checkbox" />
    <input id="oxygen" type="checkbox" />
    <input id="glucose" type="checkbox" />
  </div>

  <div id="stack">
    <img id="img-mux_rgb" alt="mux_rgb" />
    <img id="img-cellvit_mask" alt="cellvit_mask" />
    <img id="img-cell_state" alt="cell_state" />
    <img id="img-oxygen" alt="oxygen" />
    <img id="img-glucose" alt="glucose" />
  </div>
</body>
</html>
